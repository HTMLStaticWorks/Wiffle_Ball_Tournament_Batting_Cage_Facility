<!DOCTYPE html>
<html lang="en" data-theme="light" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="apple-touch-icon" href="assets/images/favicon.png">
    <title>Sign Up | STRIKE ZONE</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        secondary: '#F97316',
                    },
                    fontFamily: {
                        sports: ['Bebas Neue', 'sans-serif'],
                        body: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="font-body transition-colors duration-300 min-h-screen flex flex-col">



    <!-- Auth Background -->
    <div class="fixed inset-0 z-0">
        <img src="assets/images/auth_bg.png" class="w-full h-full object-cover grayscale brightness-50"
            alt="Background">
        <div class="absolute inset-0 bg-slate-950/40 backdrop-blur-[2px]"></div>
    </div>

    <main class="relative z-10 flex-grow flex items-center justify-center px-4 py-8">
        <div
            class="w-full max-w-xl bg-white/10 backdrop-blur-2xl border border-white/20 p-8 sm:p-12 rounded-[40px] shadow-2xl animate-fade-in my-8">
            <div class="text-center mb-10">
                <a href="index.html" class="inline-block mb-8">
                    <span class="text-4xl font-sports font-bold tracking-tighter text-white">
                        <span class="text-primary">STRIKE</span><span class="text-secondary">ZONE</span>
                    </span>
                </a>
                <h1 class="text-4xl sm:text-5xl font-sports text-white mb-2 uppercase tracking-tight">Join the <span
                        class="text-secondary">League</span></h1>
                <p class="text-slate-300 text-sm">Create your player profile and start competing.</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-4">First
                        Name</label>
                    <input type="text" placeholder="John"
                        class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white focus:outline-none focus:border-primary transition-all placeholder:text-slate-600">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-4">Last
                        Name</label>
                    <input type="text" placeholder="Doe"
                        class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 px-6 text-white focus:outline-none focus:border-primary transition-all placeholder:text-slate-600">
                </div>

                <div>
                    <label class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-4">Email
                        Address</label>
                    <div class="relative">
                        <i data-lucide="mail"
                            class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="email" placeholder="john@example.com"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-6 text-white focus:outline-none focus:border-primary transition-all placeholder:text-slate-600">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-4">Password</label>
                    <div class="relative">
                        <i data-lucide="lock"
                            class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="password" placeholder="••••••••"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-6 text-white focus:outline-none focus:border-primary transition-all placeholder:text-slate-600">
                    </div>
                </div>

                <div>
                    <label
                        class="block text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-2 ml-4">Confirm
                        Password</label>
                    <div class="relative">
                        <i data-lucide="shield-check"
                            class="absolute left-5 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-500"></i>
                        <input type="password" placeholder="••••••••"
                            class="w-full bg-white/5 border border-white/10 rounded-2xl py-4 pl-12 pr-6 text-white focus:outline-none focus:border-primary transition-all placeholder:text-slate-600">
                    </div>
                </div>

                <div class="flex items-start space-x-3 px-4 pt-2">
                    <input type="checkbox" id="terms"
                        class="mt-1 w-4 h-4 rounded bg-white/5 border-white/10 text-primary focus:ring-primary">
                    <label for="terms" class="text-[11px] text-slate-400 leading-relaxed cursor-pointer">I agree to the
                        <a href="#" class="text-white hover:text-primary">Terms of Service</a> and <a href="#"
                            class="text-white hover:text-primary">Privacy Policy</a>.</label>
                </div>

                <button type="submit"
                    class="w-full bg-primary hover:bg-blue-700 text-white font-bold py-5 rounded-2xl text-sm uppercase tracking-[0.2em] transition-all transform hover:-translate-y-1 shadow-xl shadow-primary/20">Create
                    Account</button>
            </form>

            <div class="mt-8 flex items-center gap-4">
                <div class="h-px bg-white/10 flex-grow"></div>
                <span class="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Or Register With</span>
                <div class="h-px bg-white/10 flex-grow"></div>
            </div>

            <div class="mt-8 space-y-4">
                <button
                    class="w-full flex items-center justify-center gap-3 bg-white/5 border border-white/10 hover:bg-white/10 text-white py-4 rounded-2xl transition-all group">
                    <svg class="w-5 h-5" viewBox="0 0 24 24">
                        <path fill="currentColor"
                            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
                        <path fill="currentColor"
                            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
                        <path fill="currentColor"
                            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
                        <path fill="currentColor"
                            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" />
                    </svg>
                    <span class="text-xs font-bold uppercase tracking-widest">Sign up with Google</span>
                </button>
                <button
                    class="w-full flex items-center justify-center gap-3 bg-white/5 border border-white/10 hover:bg-white/10 text-white py-4 rounded-2xl transition-all group">
                    <i data-lucide="apple" class="w-5 h-5"></i>
                    <span class="text-xs font-bold uppercase tracking-widest">Sign up with Apple</span>
                </button>
            </div>

            <div class="mt-10 pt-8 border-t border-white/10 text-center space-y-4">
                <p class="text-slate-400 text-sm">Already a player? <a href="login.html"
                        class="text-white font-bold hover:text-primary transition-colors">Sign In</a></p>
                <a href="index.html"
                    class="inline-flex items-center gap-2 text-slate-500 hover:text-white text-[10px] font-bold uppercase tracking-[0.2em] transition-colors">
                    <i data-lucide="arrow-left" class="w-3 h-3"></i> Back to Home
                </a>
            </div>
        </div>
    </main>

    <script src="assets/js/main.js"></script>
    <script>lucide.createIcons();</script>
</body>

</html>
